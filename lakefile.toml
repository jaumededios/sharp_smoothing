name = "JoseSmoothest"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["JoseSmoothest", "Showcase", "Solution"]
testDriver = "workspace_test"

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.32.0"

[[lean_lib]]
name = "JoseSmoothest"

[[lean_lib]]
name = "Showcase"

[[lean_lib]]
name = "Solution"

[[lean_exe]]
name = "workspace_test"
root = "WorkspaceTest"
