status:
  scope: >-
    Theorem 1.4 (the fourth-difference lower bound for normalized symmetric
    kernels with nonnegative Fourier transform, equality characterization,
    and unique attainment) and the supporting Proposition 1.6. The project
    also proves the arbitrary iterated-difference Fourier multiplier theorem,
    its exact reduction at every even order 2m to 2^m times a generic
    weighted polynomial norm, the full sufficient and necessary zero--peak
    theory at arbitrary m, the unconditional sharp lower bound and unique
    admissible kernel at every even order, the polynomial Pell--Abel algebra,
    and the monic squarefree minimal-genus Pell factor extracted from that
    minimizer with its endpoint valuations and interval sign. It further
    proves a direct real-phase classification of every such minimizer: the
    exact cosine and sine formulae, strict phase monotonicity, exact phase
    length, and an endpoint-coefficient formula for the sharp constant. This
    direct classification does not depend on compact Riemann surfaces,
    Abelian periods, or theta functions. It
    also proves the exact sixth-difference reduction to a cubic weighted polynomial norm,
    the sixth-order minimax/kernel theorem conditional on an abstract
    zero--peak certificate, and the complete passage from Lebedev's
    Pell--Abel/differential/equioscillation data to that certificate and the
    constant 144 r^2/N^2 for the supplied abstract endpoint parameter r.
    Identifying r with the paper's Jacobi elliptic ratio, as well as the
    analytic construction and existence of the Zolotarev data, remains out of
    scope; hence Theorem 1.7 is not yet unconditional.
  sorry_count: 4
  sorry_in_definitions: 0
  axioms:
