fidelity:
  divergences: >-
    Theorem 1.4 and its polynomial extremal prerequisite, Proposition 1.6,
    are fully formalized, including construction and unique attainment of the
    extremal kernel. Kernels are represented as finitely supported
    functions on all of ℤ with an explicit support hypothesis, rather than as
    functions whose domain is the finite interval. The sequence space is
    Mathlib's real Lp space for counting measure, which realizes ℓ²(ℤ). The
    hypotheses, stated constant, optimizer formula, and equality coefficient
    formula otherwise follow the paper's statements. The paper-facing
    Showcase retains `0 < n`; the reusable internal theorems prove the
    slightly stronger result without that unused assumption. For the sixth
    derivative, the Fourier reduction and all consequences of a finite
    zero--peak certificate are formalized. The Pell--Abel and differential
    identities are also shown to produce the cubic endpoint quotient,
    certificate, the exact constant in terms of the supplied abstract
    endpoint parameter r, and the unique kernel. The remaining missing
    component for the paper's explicit sixth-order presentation is analytic
    existence of the stated Zolotarev data from the theta/elliptic
    construction, including existence of k_N. Independently, the minimizer at
    every even order now has an unconditional direct minimal-genus Pell and
    real-phase classification. Thus Theorem 1.7 is still not claimed from the
    paper's stated theta data alone.

review:
  status: "self-assessed"
  reviewers:
    - "OpenAI Codex"
  notes: >-
    The project builds, the mathematical modules are sorry-free, and
    leanprover/comparator accepts the paper-facing statements using only the
    listed axioms and Lean's kernel. The source-to-Lean fidelity has not yet
    received independent human peer review or author verification.

alignment:
  namespace: "JoseSmoothest"
  statements:
    - source: "Theorem 1.4, inequality (1.5)"
      lean: "smoothestAverage_inequality"
      module: "JoseSmoothest.Challenge"
      status: "proved"
      note: >-
        Fourth-order smoothness lower bound with the paper's constant. The
        internal theorem also covers n = 0; Showcase retains the paper's n > 0
        assumption.
    - source: "Theorem 1.4, equality formula (1.6)"
      lean: "smoothestAverage_eq_iff"
      module: "JoseSmoothest.Challenge"
      status: "proved"
      note: "Characterizes equality by the Chebyshev coefficient formula."
    - source: "Theorem 1.4, attainment and uniqueness"
      lean: "existsUnique_extremalKernel"
      module: "JoseSmoothest.Challenge"
      status: "proved"
      note: >-
        Constructs the kernel from Chebyshev coefficients, proves it
        admissible and sharp, and proves uniqueness among admissible kernels.
    - source: "Proposition 1.6, inequality (1.7)"
      lean: "weightedPolynomialNorm_ge"
      module: "JoseSmoothest.WeightedExtremal"
      status: "proved"
      note: "Sharp weighted polynomial-norm inequality."
    - source: "Proposition 1.6, equality formula (1.8)"
      lean: "weightedPolynomialNorm_eq_iff"
      module: "JoseSmoothest.WeightedExtremal"
      status: "proved"
      note: "Unique transformed-Chebyshev equality case."
    - source: "Theorem 1.7, Fourier reduction to Proposition 1.9"
      lean: >-
        differenceSmoothness_six_eq_eight_mul_cubicWeightedPolynomialNorm
      module: "JoseSmoothest.SixthOrder"
      status: "proved"
      note: "Exact sixth-difference norm identity with the factor eight."
    - source: "Higher-even-order weighted reduction discussed after Theorem 1.7"
      lean: >-
        differenceSmoothness_two_mul_eq_pow_mul_evenWeightedPolynomialNorm
      module: "JoseSmoothest.EvenOrder.FourierReduction"
      status: "proved"
      note: >-
        Exact order-2m identity, with factor 2^m, before any extremal or
        special-function assumption.
    - source: "Higher-even-order zero--peak minimax principle"
      lean: "evenWeightedPolynomialNorm_eq_iff_of_certificate"
      module: "JoseSmoothest.EvenOrder.WeightedMinimax"
      status: "proved"
      note: >-
        A generic sufficient alternation certificate gives the sharp norm
        and unique admissible quotient for every endpoint order m.
    - source: "Higher-even-order constrained minimizer and equioscillation"
      lean: "existsUnique_evenWeightedMinimizer"
      module: "JoseSmoothest.EvenOrder.Equioscillation"
      status: "proved"
      note: >-
        Compact finite-dimensional minimization plus the active-set
        separator dichotomy gives an unconditional unique weighted minimizer
        and a full zero--peak certificate for every 1 <= m <= N.
    - source: "Unconditional sharp smoothing theorem at every even order"
      lean: "existsUnique_smoothestEvenOrderKernel"
      module: "JoseSmoothest.EvenOrder"
      status: "proved"
      note: >-
        For every m >= 1 and support radius n, constructs the unique
        admissible kernel attaining the intrinsic sharp 2m-th difference
        constant. The lower bound and both polynomial and kernel equality
        characterizations are unconditional; the special-function layer is
        only needed to express the minimizer more explicitly.
    - source: "Pell--Abel endpoint-contact algebra used in the higher-order plan"
      lean: "Polynomial.PellAbelSolution.rootMultiplicity_differentialNumerator"
      module: "JoseSmoothest.SpecialFunctions.PellAbel"
      status: "proved"
      note: >-
        Exact (m-1)/2 valuation of the differential numerator, together with
        the reusable coprimality, divisibility, and degree infrastructure.
    - source: "Minimal-genus Pell extraction from the even-order minimizer"
      lean: "EndpointAlternant.squarefree_D"
      module: "JoseSmoothest.EvenOrder.PellExtraction"
      status: "proved"
      note: >-
        Extracts the monic squarefree residual weight from the endpoint
        alternant, proves its exact minimal-genus degree, both endpoint
        valuations, negativity on the open interval, and the resulting
        endpoint-contact package. Squarefreeness is proved directly over
        real polynomials, including irreducible quadratic factors.
    - source: "Direct real-phase classification of every even-order minimizer"
      lean: "smoothestEvenOrder_cosine_classification"
      module: "JoseSmoothest.EvenOrder.DirectClassification"
      status: "proved"
      note: >-
        The extracted normalized alternant is the cosine of a strictly
        increasing integral phase. Consecutive alternation nodes have phase
        values j*pi, so the exact scaled phase winding is (n+1)*pi after
        multiplying by the polynomial degree. No compact-curve or period
        theory is used.
    - source: "Endpoint formula for the arbitrary-even sharp constant"
      lean: "sharpEvenDifferenceConstant_eq_endpointDValue"
      module: "JoseSmoothest.EvenOrder.DirectClassification"
      status: "proved"
      note: >-
        Identifies the weighted peak and hence the sharp kernel constant with
        the endpoint coefficient of the monic squarefree minimal-genus Pell
        weight extracted from the canonical minimizer.
    - source: "Proposition 1.9, zero--peak extremal argument"
      lean: "cubicWeightedPolynomialNorm_ge_of_certificate"
      module: "JoseSmoothest.SixthOrder"
      status: "proved conditionally"
      note: >-
        Proves sharpness and uniqueness from the finite alternation
        certificate.
    - source: "Proposition 4.3 and Theorem 1.7, Zolotarev endpoint algebra"
      lean: >-
        CubicZolotarevData.sixthOrderSmoothness_ge_paperConstant
      module: "JoseSmoothest.Zolotarev"
      status: "proved conditionally"
      note: >-
        Derives the triple endpoint quotient, normalization, nonnegativity,
        certificate, exact 144 r^2/N^2 constant for the supplied abstract r,
        equality, and unique kernel from Lebedev's polynomial
        Pell/differential/equioscillation package. Constructing that package
        from an elliptic modulus and identifying r with the paper's Jacobi
        ratio remain open.

