name: Lean Comparator

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  comparator:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # actions/checkout v4.2.2, pinned as in leanprover/lean-eval.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # leanprover/lean-action v1.5.0, pinned as in leanprover/lean-eval.
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9
        with:
          use-mathlib-cache: true

      # actions/setup-go v5.5.0, pinned as in leanprover/lean-eval.
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.24.0'

      - name: Install pinned landrun
        run: |
          go install github.com/zouuup/landrun/cmd/landrun@5ed4a3db3a4ad930d577215c6b9abaa19df7f99f
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build pinned comparator and lean4export
        run: |
          git clone https://github.com/leanprover/comparator.git .ci/comparator
          cd .ci/comparator
          git checkout 07bc4ea40f2266dcb861820a2ec1fa3244ed307f
          lake build comparator lean4export
          echo "$PWD/.lake/build/bin" >> "$GITHUB_PATH"
          echo "$PWD/.lake/packages/lean4export/.lake/build/bin" >> "$GITHUB_PATH"

      - name: Compare and kernel-check both parts of Theorem 1.4
        run: lake test
